<input id="imie" placeholder="Imię">
<input id="nazwisko" placeholder="Nazwisko">
<button onclick="dodajDoTabeli()">Dodaj</button>
<table id="tabela" border="1"><tr><th>Imię</th><th>Nazwisko</th></tr></table>

<script>
function dodajDoTabeli() {
    let table = document.getElementById("tabela");
    let row = table.insertRow();
    row.insertCell(0).textContent = document.getElementById("imie").value;
    row.insertCell(1).textContent = document.getElementById("nazwisko").value;
    document.getElementById("imie").value = "";
    document.getElementById("nazwisko").value = "";
}
</script>
