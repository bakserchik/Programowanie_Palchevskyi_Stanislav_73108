<!DOCTYPE html>
<html>
<body>

<h3>Prosty Kalkulator</h3>
<input type="number" id="num1" placeholder="Liczba 1">
<input type="number" id="num2" placeholder="Liczba 2">

<br><br>
<button onclick="oblicz('+')">+</button>
<button onclick="oblicz('-')">-</button>
<button onclick="oblicz('*')">*</button>
<button onclick="oblicz('/')">/</button>
<button onclick="oblicz('^')">^ (potęga)</button>

<p>Wynik: <span id="wynik">0</span></p>

<script>
function oblicz(operator) {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let wynik = 0;

    if (isNaN(a) || isNaN(b)) {
        alert("Wpisz poprawne liczby!");
        return;
    }

    switch(operator) {
        case '+': wynik = a + b; break;
        case '-': wynik = a - b; break;
        case '*': wynik = a * b; break;
        case '/': 
            wynik = (b !== 0) ? (a / b) : "Błąd (dzielenie przez 0)"; 
            break;
        case '^': wynik = Math.pow(a, b); break;
    }
    
    document.getElementById("wynik").textContent = wynik;
}
</script>

</body>
</html>
