// Zadanie 13
function nawiasy(txt){

    let stack = [];

    for(let znak of txt){

        if(znak === "("){
            stack.push(znak);
        }

        if(znak === ")"){

            if(stack.length === 0){
                return false;
            }

            stack.pop();
        }
    }

    return stack.length === 0;
}

console.log(nawiasy("(())"));
console.log(nawiasy("(()"));
